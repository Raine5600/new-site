<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Site</title>
  <meta name="description" content="A new site — ready to build." />
  <meta name="theme-color" content="#55b462" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #55b462;
      --blue: #5495b5;
      --bg: #02040a;
      --text: #ffffff;
      --muted: #99a1af;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 32px;
      background: rgba(255, 255, 255, 0.03);
    }

    .badge {
      display: inline-block;
      color: var(--blue);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    h1 span { color: var(--accent); }

    p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">New Project</span>
    <h1>Ready to<br /><span>Build</span></h1>
    <p>Your new site repository is set up. Replace this page when you're ready to start.</p>
  </main>
</body>
</html>
